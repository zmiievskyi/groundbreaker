services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "${N8N_PORT}:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      # demo is accessed over plain HTTP on the LAN; n8n's secure cookie
      # requires HTTPS, so disable it (local/dry-run only — front with TLS for real use)
      N8N_SECURE_COOKIE: "false"
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      # keep n8n's ~90 internal tables in their own schema so `public`
      # holds only the application domain (projects/companies/leads/…)
      DB_POSTGRESDB_SCHEMA: n8n
      # provider keys available to workflow nodes
      SERP_API_KEY: ${SERP_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      HUNTER_API_KEY: ${HUNTER_API_KEY}
      SCRAPINGBEE_API_KEY: ${SCRAPINGBEE_API_KEY:-}
      TARGET_REGIONS: ${TARGET_REGIONS}
      MIN_FIT_SCORE: ${MIN_FIT_SCORE}
      SANDBOX_OUTREACH_EMAIL: ${SANDBOX_OUTREACH_EMAIL}
      # allow Code nodes to read $env (so TARGET_REGIONS et al. drive workflows
      # instead of being hardcoded) — the Code sandbox blocks env access by default
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  # reverse proxy for the showcase domains (groundbreaker.* and n8n.*).
  # Connected to cloudflare_default so cloudflared can reach it through the tunnel.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      # bcrypt hash is inlined directly in Caddyfile (one-way; not a secret)
      N8N_INTERNAL_AUTH: ${N8N_INTERNAL_AUTH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - default
      - cloudflare
    depends_on:
      - n8n

networks:
  default:
  cloudflare:
    name: cloudflare_default
    external: true

volumes:
  postgres_data:
  n8n_data:
  caddy_data:
  caddy_config:
